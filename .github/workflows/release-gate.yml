name: release-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run release gate (quick)
        env:
          EIT_GATE_ENABLE_LINT: off
          EIT_GATE_RUN_OPTIONAL_DB: 0
          EIT_GATE_CHECK_SCHEMA_PATH: 1
        run: bash scripts/release_gate.sh quick
