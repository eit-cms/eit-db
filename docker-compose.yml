services:
  # PostgreSQL 15
  postgres:
    image: postgres:15-alpine
    container_name: eit-db-postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "max_connections=100"

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: eit-db-redis
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"

  # ArangoDB 3
  arango:
    image: arangodb:3.12
    container_name: eit-db-arango
    environment:
      ARANGO_NO_AUTH: "1"
    ports:
      - "58529:8529"
    volumes:
      - arango_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8529/_api/version > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: eit-db-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_INITDB_ARGS: "--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testuser", "-ptestpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "--max_allowed_packet=256M"
      - "--sort_buffer_size=4M"
      - "--bulk_insert_buffer_size=16M"

  # SQL Server 2022 (Linux)
  # 注意：需要至少2GB内存，可选
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eit-db-sqlserver
    user: "0:0"
    entrypoint: /bin/bash -c "chown -R 10001:0 /var/opt/mssql && exec /opt/mssql/bin/sqlservr"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Test@1234"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Test@1234' -No -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 2G

  # MongoDB 7
  mongodb:
    image: mongo:7
    container_name: eit-db-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j 5
  neo4j:
    image: neo4j:5
    container_name: eit-db-neo4j
    environment:
      NEO4J_AUTH: "neo4j/neo4jtest"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p neo4jtest 'RETURN 1' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  arango_data:
    driver: local
  mysql_data:
    driver: local
  sqlserver_data:
    driver: local
  mongodb_data:
    driver: local
  neo4j_data:
    driver: local

networks:
  default:
    name: eit-db-network
